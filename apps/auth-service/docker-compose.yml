version: '3.8'

# ============================================================
# Networks
# ============================================================

networks:
  auth-network:
    driver: bridge
    name: auth-network

# ============================================================
# Volumes
# ============================================================

volumes:
  postgres_data:
    name: auth-postgres-data
  redis_data:
    name: auth-redis-data
  # ✅ New: Volume for npm cache to speed up builds
  npm_cache:
    name: auth-npm-cache

# ============================================================
# Services
# ============================================================

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  auth-db:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-auth_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - dev
      - prod
      - migrate
      - seed

  # ----------------------------------------
  # Redis Cache
  # ----------------------------------------
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - auth-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - dev
      - prod

  # ----------------------------------------
  # Auth Service (Development)
  # ----------------------------------------
  auth-service-dev:
    build:
      context: ../..                     # ✅ Monorepo root context
      dockerfile: apps/auth-service/Dockerfile
      target: builder
    container_name: auth-service-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@auth-db:5432/${DB_NAME:-auth_db}
      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    ports:
      - "${APP_PORT:-3000}:3000"
      - "9229:9229"                      # Debug port
    volumes:
      - ../..:/app                       # ✅ Mount entire monorepo
      - npm_cache:/app/.npm              # ✅ Cache node_modules
    command: npm run start:dev --workspace=apps/auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - dev

  # ----------------------------------------
  # Auth Service (Production - Standalone)
  # ----------------------------------------
  auth-service-prod:
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
      target: runner
    container_name: auth-service-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      # ✅ Removed replicas & swarm-specific options for standalone compatibility
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - prod

  # ----------------------------------------
  # Auth Service (Production - Swarm Mode)
  # ----------------------------------------
  auth-service-swarm:
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
      target: runner
    image: auth-service:latest
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - auth-network
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.auth.rule=Host(`auth.vubon.com.bd`)"
        - "traefik.http.services.auth.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - swarm

  # ----------------------------------------
  # Database Migration Runner (Ensures order)
  # ----------------------------------------
  auth-migrate:
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
      target: builder
    container_name: auth-migrate
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@auth-db:5432/${DB_NAME:-auth_db}
    command: npx prisma migrate deploy
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - auth-network
    profiles:
      - migrate
    restart: "no"

  # ----------------------------------------
  # Database Seeder (Runs after migration)
  # ----------------------------------------
  auth-seed:
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
      target: builder
    container_name: auth-seed
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@auth-db:5432/${DB_NAME:-auth_db}
    command: npx prisma db seed
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    networks:
      - auth-network
    profiles:
      - seed
    restart: "no"

  # ----------------------------------------
  # One‑command setup: migrate + seed
  # ----------------------------------------
  auth-setup:
    image: alpine:latest
    container_name: auth-setup
    command: >
      sh -c "echo '✅ Database is ready. Run migration and seed using:' &&
             echo 'docker compose --profile migrate up' &&
             echo 'docker compose --profile seed up'"
    depends_on:
      auth-db:
        condition: service_healthy
    profiles:
      - setup
    restart: "no"
