name: Node.js CI (Monorepo Code Quality)

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=apps/auth-service

      - name: Check Code Formatting
        run: npm run format:check --workspaces

      - name: Run ESLint
        run: npm run lint:check --workspaces

      - name: TypeScript Type Check
        run: npm run type-check --workspaces

      - name: Run Tests
        run: npm test --workspaces --if-present

      - name: Build All Projects
        run: npm run build --workspaces

      - name: Debug Information
        if: always()
        run: |
          echo "========== NODE =========="
          node -v

          echo "========== NPM =========="
          npm -v

          echo "========== WORKSPACES =========="
          npm query .workspace.name || true

          echo "========== PRETTIER =========="
          npx prettier --check "**/*.{ts,tsx,js,json,md}" || true

          echo "========== ESLINT =========="
          npx eslint . --ext .ts,.tsx --format stylish || true

          echo "========== TYPESCRIPT =========="
          npx tsc --noEmit --pretty || true
