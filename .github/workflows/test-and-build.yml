name: Node.js CI (Code Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড নিয়ে আসা
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ২. নোড সেটআপ করা এবং নির্দিষ্ট ফোল্ডারের লক ফাইল ক্যাশ করা
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # গিটহাবকে বলে দেওয়া হলো লক ফাইলটি কোন ফোল্ডারে আছে
        cache-dependency-path: app/auth-service/package-lock.json

    # ৩. নির্দিষ্ট ফোল্ডারে ঢুকে প্যাকেজ ইনস্টল করা
    - name: Install dependencies
      working-directory: app/auth-service
      run: npm ci

    # ৪. নির্দিষ্ট ফোল্ডারে টেস্ট রান করা (যদি টেস্ট স্ক্রিপ্ট থাকে)
    - name: Run Tests
      working-directory: app/auth-service
      run: npm test --if-present # টেস্ট স্ক্রিপ্ট না থাকলেও যেন এরর না দেয়

    # ৫. নির্দিষ্ট ফোল্ডারে প্রজেক্ট বিল্ড করা
    - name: Build Project
      working-directory: app/auth-service
      run: npm run build --if-present
