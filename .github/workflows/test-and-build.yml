name: Node.js CI (Code Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড নিয়ে আসা
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ২. নোড সেটআপ করা (ক্যাশিং পাথ অটোমেশন করে দেওয়া হলো)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # গিটহাব নিজে খুঁজে নেবে ফাইলটি যেখানেই থাকুক
        cache-dependency-path: '**/package-lock.json' 

    # ৩. auth-service ফোল্ডারে ঢুকে প্যাকেজ ইনস্টল করা
    - name: Install dependencies
      working-directory: app/auth-service
      run: npm install # npm ci এর বদলে npm install দিলে লক ফাইল মিসিং হলেও এরর দেয় না

    # ৪. টেস্ট রান করা
    - name: Run Tests
      working-directory: app/auth-service
      run: npm test --if-present

    # ৫. প্রজেক্ট বিল্ড করা
    - name: Build Project
      working-directory: app/auth-service
      run: npm run build --if-present
