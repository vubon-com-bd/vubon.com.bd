name: Node.js CI (Code Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড নিয়ে আসা
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ২. নোড সেটআপ করা এবং 'apps' ফোল্ডারের লক ফাইল ট্র্যাক করা
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/auth-service/package-lock.json # 'app' পরিবর্তন করে 'apps' করা হয়েছে

    # ৩. সঠিক ফোল্ডারে (apps) ঢুকে প্যাকেজ ইনস্টল করা
    - name: Install dependencies
      working-directory: apps/auth-service # 'app' পরিবর্তন করে 'apps' করা হয়েছে
      run: npm ci

    # ৪. টেস্ট রান করা
    - name: Run Tests
      working-directory: apps/auth-service
      run: npm test --if-present

    # ৫. প্রজেক্ট বিল্ড করা
    - name: Build Project
      working-directory: apps/auth-service
      run: npm run build --if-present
