name: Node.js CI (Code Quality)

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/auth-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma Client
        run: >
          npx prisma generate
          --schema=src/module/infrastructure/persistence/prisma/schema/schema.prisma

      - name: Check Code Formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint:check

      - name: TypeScript Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm test --if-present

      - name: Build Project
        run: npm run build

      - name: Debug Information
        if: always()
        run: |
          echo "========== NODE =========="
          node -v

          echo "========== NPM =========="
          npm -v

          echo "========== PRETTIER =========="
          npx prettier --list-different "src/**/*.ts" || true

          echo "========== ESLINT =========="
          npx eslint src --ext .ts --format stylish || true

          echo "========== TYPESCRIPT =========="
          npx tsc --noEmit --pretty || true
