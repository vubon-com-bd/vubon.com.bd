name: Node.js CI (Code Quality)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/auth-service

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Show Environment
        run: |
          node -v
          npm -v
          npx prettier --version
          npx eslint --version
          npx tsc --version

      - name: Generate Prisma Client
        run: |
          npx prisma generate \
          --schema=src/module/infrastructure/persistence/prisma/schema/schema.prisma

      - name: Prettier Check (Detailed)
        run: |
          npx prettier --check "src/**/*.ts"
          echo "=============================="
          echo "FILES DIFFERENT FROM PRETTIER:"
          npx prettier --list-different "src/**/*.ts"

      - name: ESLint
        run: |
          npx eslint src --ext .ts

      - name: TypeScript
        run: |
          npx tsc --noEmit --pretty

      - name: Tests
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: ESLint (Line Numbers)
        run: |
              npx eslint src --ext .ts --format stylish
