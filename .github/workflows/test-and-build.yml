name: Vubon Monorepo CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:

# =====================================================
# 1. QUALITY CHECK & BUILD
# =====================================================
  ci:
    name: CI - Validate & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Update npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./apps/auth-service/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Full Code Validation
        run: npm run check
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Build Workspace
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vubon-build
          retention-days: 7
          path: |
            apps/**/.next
            apps/**/dist
            packages/**/dist
            package.json
            package-lock.json

# =====================================================
# 2. SECURITY SCAN (CodeQL & Audit)
# =====================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install --no-prepare

      - name: Dependency Audit
        run: npm audit --omit=dev --audit-level=high

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4

# =====================================================
# 3. STAGING DEPLOYMENT
# =====================================================
  deploy-staging:
    name: Deploy Staging
    needs: [ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.vubon.com.bd

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: vubon-build

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Production Dependencies
        run: |
          npm install --no-prepare --omit=dev
          npm run prisma:generate --if-present
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Database Migration
        run: cd apps/auth-service && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy Staging
        run: echo "Deploying to staging server..."

# =====================================================
# 4. PRODUCTION DEPLOYMENT
# =====================================================
  deploy-production:
    name: Deploy Production
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://vubon.com.bd

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: vubon-build

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Production Dependencies
        run: |
          npm install --no-prepare --omit=dev
          npm run prisma:generate --if-present
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Production Migration
        run: cd apps/auth-service && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy Production
        run: echo "Deploying Vubon Production..."
