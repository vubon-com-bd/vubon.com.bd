name: Node.js CI (Code Check)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড নিয়ে আসা
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ২. নোড সেটআপ করা
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json' # লক ফাইল যেখানেই থাকুক অটো-ডিটেক্ট করবে

    # ৩. 'npm ci' এর বদলে 'npm install' ব্যবহার করা
    - name: Install dependencies
      working-directory: apps/auth-service
      run: npm install

    # ৪. টেস্ট রান করা
    - name: Run Tests
      working-directory: apps/auth-service
      run: npm test --if-present

    # ৫. প্রজেক্ট বিল্ড করা
    - name: Build Project
      working-directory: apps/auth-service
      run: npm run build --if-present
