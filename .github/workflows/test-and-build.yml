name: Node.js CI (Code Quality)

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/auth-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Auto-format with Prettier
        # Run Prettier to fix formatting issues so format:check passes in CI.
        # This step will commit and push changes back to the branch if any files are modified.
        run: |
          npx prettier --write .
          # Configure git for the commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(format): apply Prettier fixes"
            git push
          else
            echo "No formatting changes"
          fi

      - name: Generate Prisma Client
        run: >
          npx prisma generate
          --schema=src/module/infrastructure/persistence/prisma/schema/schema.prisma

      - name: Check Code Formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint:check

      - name: TypeScript Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm test --if-present

      - name: Build Project
        run: npm run build
